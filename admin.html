<!DOCTYPE html>
<html lang="pl" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Autoforum — Panel administracyjny</title>
  <style>
    /* ============================================================
       PALETTE — two themes, premium feel
       Dark = "Mercedes Night"   (deep black + warm gold)
       Light = "Maybach Atelier" (cream paper + bronze)
       ============================================================ */
    :root[data-theme="dark"] {
      --bg:        #0c0d10;
      --panel:     #15171d;
      --panel-2:   #1c1f27;
      --panel-3:   #232732;
      --border:    #2a2e38;
      --border-2:  #353a47;
      --text:      #f3efe6;
      --text-soft: #c4bfb1;
      --muted:     #7c7d85;
      --muted-2:   #5a5d68;
      --accent:    #c8a26b;   /* warm gold */
      --accent-2:  #d8b481;
      --accent-on: #1a1408;
      --ok:        #8fc89a;
      --err:       #e07a7a;
      --warn:      #e8c270;
      --shadow:    0 12px 40px rgba(0,0,0,0.55);
      --shadow-sm: 0 2px 8px rgba(0,0,0,0.35);
    }
    :root[data-theme="light"] {
      --bg:        #ece5d6;   /* paper cream */
      --panel:     #f7f1e3;
      --panel-2:   #ebe2cb;
      --panel-3:   #ddd0b1;
      --border:    #cfc1a3;
      --border-2:  #bfaf8c;
      --text:      #1a1612;
      --text-soft: #3d342a;
      --muted:     #6e6049;
      --muted-2:   #948464;
      --accent:    #8b6f3f;   /* bronze */
      --accent-2:  #a08349;
      --accent-on: #fff8ea;
      --ok:        #4e7a3b;
      --err:       #a14040;
      --warn:      #b07c1a;
      --shadow:    0 18px 50px rgba(60,40,15,0.12);
      --shadow-sm: 0 2px 6px rgba(60,40,15,0.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', 'Inter', system-ui, sans-serif;
      font-size: 14.5px;
      line-height: 1.55;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
      transition: background-color 0.3s ease, color 0.3s ease;
    }

    a  { color: var(--accent); text-decoration: none; }
    a:hover { color: var(--accent-2); }

    /* ============================================================
       Form controls
       ============================================================ */
    input, textarea, select {
      font: inherit;
      color: var(--text);
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      width: 100%;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
    }
    input:hover, textarea:hover, select:hover { border-color: var(--border-2); }
    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200, 162, 107, 0.18);
    }
    textarea { resize: vertical; min-height: 86px; line-height: 1.5; }

    button { font: inherit; cursor: pointer; transition: all 0.18s ease; }

    .btn-primary {
      padding: 10px 18px;
      background: var(--accent);
      color: var(--accent-on);
      border: 1px solid var(--accent);
      border-radius: 8px;
      font-weight: 500;
      letter-spacing: 0.01em;
      white-space: nowrap;
    }
    .btn-primary:hover { background: var(--accent-2); border-color: var(--accent-2); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .btn-primary:active { transform: translateY(0); }

    .btn-ghost {
      padding: 10px 18px;
      background: transparent;
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      font-weight: 500;
      white-space: nowrap;
    }
    .btn-ghost:hover { border-color: var(--accent); color: var(--accent); }

    .btn-danger {
      padding: 6px 12px;
      background: transparent;
      color: var(--text-soft);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 0.84rem;
    }
    .btn-danger:hover { border-color: var(--err); color: var(--err); }

    /* ============================================================
       Login
       ============================================================ */
    #login { min-height: 100vh; display: grid; place-items: center; padding: 2rem; }
    #login form {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2.4rem 2.2rem;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow);
    }
    #login h1 {
      font-size: 1.05rem;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 0.3rem;
    }
    #login .sub { color: var(--muted); margin-bottom: 1.8rem; font-size: 0.86rem; }
    #login .field { margin-bottom: 1.1rem; }
    #login label {
      display: block;
      margin-bottom: 0.45rem;
      font-size: 0.74rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.14em;
    }
    #login button[type=submit] {
      width: 100%;
      padding: 12px;
      background: var(--accent);
      color: var(--accent-on);
      border: 1px solid var(--accent);
      border-radius: 8px;
      font-weight: 500;
      margin-top: 0.5rem;
      letter-spacing: 0.04em;
    }
    #login button[type=submit]:hover { background: var(--accent-2); border-color: var(--accent-2); }
    #login .hint {
      color: var(--muted);
      font-size: 0.78rem;
      margin-top: 1.2rem;
      line-height: 1.55;
      text-align: center;
    }
    #login .err { color: var(--err); margin-top: 0.8rem; font-size: 0.86rem; min-height: 1.2em; }

    /* ============================================================
       App layout
       ============================================================ */
    #app {
      display: none;
      min-height: 100vh;
      grid-template-columns: 270px 1fr;
      grid-template-rows: 64px 1fr;
      grid-template-areas: "topbar topbar" "sidebar main";
    }
    #app.ready { display: grid; }

    .topbar {
      grid-area: topbar;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.6rem;
      background: var(--panel);
      border-bottom: 1px solid var(--border);
    }
    .brand {
      font-size: 0.84rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-soft);
    }
    .brand b { color: var(--accent); font-weight: 500; letter-spacing: 0.06em; }
    .topbar-right { display: flex; align-items: center; gap: 0.7rem; }
    .topbar-right .user { color: var(--muted); font-size: 0.82rem; }
    .theme-switch {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
      padding: 7px 13px;
      border-radius: 8px;
      font-size: 0.82rem;
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
    }
    .theme-switch:hover { border-color: var(--accent); color: var(--accent); }
    .theme-switch .icon { width: 14px; height: 14px; }

    /* ============================================================
       Sidebar
       ============================================================ */
    .sidebar {
      grid-area: sidebar;
      background: var(--panel);
      border-right: 1px solid var(--border);
      padding: 1.4rem 0.75rem;
      overflow-y: auto;
    }
    .sidebar h4 {
      font-size: 0.66rem;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--muted-2);
      padding: 0.5rem 0.95rem;
      margin-top: 1.1rem;
      font-weight: 500;
    }
    .sidebar h4:first-child { margin-top: 0; }
    .sidebar .tab {
      display: block;
      width: 100%;
      text-align: left;
      background: transparent;
      border: none;
      color: var(--text-soft);
      padding: 0.65rem 0.95rem;
      border-radius: 8px;
      font-size: 0.92rem;
      letter-spacing: 0.01em;
      margin-bottom: 2px;
    }
    .sidebar .tab:hover { background: var(--panel-2); color: var(--text); }
    .sidebar .tab.active {
      background: var(--accent);
      color: var(--accent-on);
      font-weight: 500;
    }

    /* ============================================================
       Main content
       ============================================================ */
    .main {
      grid-area: main;
      overflow-y: auto;
      padding: 2.4rem 3rem 5rem;
    }
    .page-head h2 {
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: -0.01em;
      margin-bottom: 0.3rem;
    }
    .page-head .desc {
      color: var(--muted);
      font-size: 0.92rem;
      max-width: 640px;
    }
    .page-head-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 1.4rem;
      margin-bottom: 2.2rem;
    }
    .page-head-row > div { min-width: 0; }
    .preview-link { flex-shrink: 0; }
    @media (max-width: 560px) {
      .page-head-row { flex-direction: column; gap: 0.9rem; }
    }

    .section {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.6rem 1.8rem;
      margin-bottom: 1.6rem;
      box-shadow: var(--shadow-sm);
    }
    .section > h3 {
      font-size: 0.78rem;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.18em;
      color: var(--accent);
      margin-bottom: 0.4rem;
    }
    .section > .help {
      font-size: 0.86rem;
      color: var(--muted);
      margin-bottom: 1.4rem;
      line-height: 1.55;
      max-width: 720px;
    }

    /* Subsection (group of strings) */
    .subgroup {
      margin-top: 1.4rem;
      padding-top: 1.4rem;
      border-top: 1px dashed var(--border);
    }
    .subgroup:first-of-type { margin-top: 0; padding-top: 0; border-top: none; }
    .subgroup-head h4 {
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 0.01em;
      margin-bottom: 0.2rem;
      color: var(--text);
    }
    .subgroup-head .desc {
      font-size: 0.8rem;
      color: var(--muted);
      margin-bottom: 0.9rem;
      max-width: 620px;
      line-height: 1.55;
    }

    /* Field row */
    .field-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.5rem;
      padding: 0.85rem 0;
      border-bottom: 1px dashed var(--border);
    }
    .field-row:last-child { border-bottom: none; }
    .field-row .label-text {
      display: block;
      font-size: 0.74rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 0.1rem;
    }
    .field-row .label-key {
      display: block;
      font-size: 0.68rem;
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      color: var(--muted-2);
      margin-bottom: 0.45rem;
    }
    .field-row .ctrl { display: flex; gap: 0.6rem; align-items: center; }
    .field-row .save-state {
      font-size: 0.76rem;
      color: var(--muted);
      min-width: 90px;
      text-align: right;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .field-row .save-state.ok  { color: var(--ok); }
    .field-row .save-state.err { color: var(--err); }

    /* Media row — flex, no overflow */
    .media-row {
      display: flex;
      gap: 1.1rem;
      align-items: center;
      padding: 1rem 0;
      border-bottom: 1px dashed var(--border);
    }
    .media-row:last-child { border-bottom: none; }
    .media-thumb {
      flex: 0 0 110px;
      width: 110px;
      height: 76px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: grid;
      place-items: center;
      overflow: hidden;
    }
    .media-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .media-thumb .empty { color: var(--muted-2); font-size: 0.74rem; }
    .media-info { flex: 1 1 auto; min-width: 0; }
    .media-info .label-text {
      font-size: 0.74rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 0.2rem;
    }
    .media-info .name { font-size: 0.96rem; font-weight: 500; margin-bottom: 0.3rem; color: var(--text); }
    .media-info .url {
      font-family: ui-monospace, 'SF Mono', Menlo, monospace;
      font-size: 0.72rem;
      color: var(--muted-2);
      word-break: break-all;
      line-height: 1.5;
    }
    .media-row .right {
      flex: 0 0 auto;
      display: flex;
      gap: 0.6rem;
      align-items: center;
      white-space: nowrap;
    }
    .media-row .save-state { font-size: 0.76rem; color: var(--muted); min-width: 100px; text-align: right; }
    .media-row .save-state.ok  { color: var(--ok); }
    .media-row .save-state.err { color: var(--err); }

    /* Region (block list) */
    .region {
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.2rem 1.3rem;
      margin-bottom: 1rem;
    }
    .region-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
      gap: 1rem;
    }
    .region-head h4 { font-size: 0.98rem; font-weight: 500; margin-bottom: 0.15rem; letter-spacing: 0.01em; }
    .region-head .desc { font-size: 0.8rem; color: var(--muted); line-height: 1.5; max-width: 460px; }
    .block-card {
      display: grid;
      grid-template-columns: 60px 1fr auto auto auto;
      gap: 0.7rem;
      align-items: center;
      padding: 0.75rem 0.9rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 0.55rem;
    }
    .block-card:hover { border-color: var(--border-2); }
    .block-card .order input { padding: 5px 7px; text-align: center; font-size: 0.84rem; }
    .block-card .summary { font-size: 0.92rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; min-width: 0; }
    .block-card .summary .type-chip {
      display: inline-block;
      background: var(--panel-3);
      color: var(--accent);
      font-size: 0.66rem;
      padding: 3px 9px;
      border-radius: 4px;
      margin-right: 0.7rem;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      vertical-align: 1px;
    }
    .visible-toggle {
      padding: 5px 11px;
      background: var(--panel-3);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 5px;
      font-size: 0.76rem;
    }
    .visible-toggle.hidden { color: var(--muted-2); opacity: 0.7; }
    .visible-toggle:hover { border-color: var(--accent); }
    .edit-btn {
      padding: 5px 11px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text);
      border-radius: 5px;
      font-size: 0.76rem;
    }
    .edit-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ============================================================
       Modal
       ============================================================ */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.65);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      padding: 2rem;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      max-width: 720px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      box-shadow: var(--shadow);
    }
    .modal-head {
      padding: 1.4rem 1.8rem 1.1rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 1rem;
    }
    .modal-head h3 { font-size: 0.78rem; font-weight: 500; text-transform: uppercase; letter-spacing: 0.18em; color: var(--accent); margin-bottom: 0.25rem; }
    .modal-head .title-row { font-size: 1.25rem; font-weight: 400; letter-spacing: -0.01em; color: var(--text); margin-bottom: 0.3rem; }
    .modal-head .desc { color: var(--muted); font-size: 0.86rem; line-height: 1.55; }
    .modal-head button.close { background: transparent; border: none; color: var(--muted); font-size: 1.6rem; padding: 0; line-height: 1; cursor: pointer; }
    .modal-head button.close:hover { color: var(--err); }
    .modal-body { padding: 1.5rem 1.8rem; }
    .modal-foot { padding: 1.1rem 1.8rem; border-top: 1px solid var(--border); display: flex; justify-content: flex-end; gap: 0.6rem; }

    .modal-field { margin-bottom: 1.2rem; }
    .modal-field label {
      display: block;
      font-size: 0.74rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.12em;
      margin-bottom: 0.4rem;
      font-weight: 500;
    }
    .modal-field small.hint {
      display: block;
      color: var(--muted-2);
      font-size: 0.78rem;
      margin-top: 0.35rem;
      line-height: 1.5;
    }
    .modal-field .upload-img { display: flex; gap: 0.7rem; align-items: center; }
    .modal-field .upload-img .preview {
      width: 70px;
      height: 50px;
      background: var(--panel-2);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      flex: 0 0 70px;
    }
    .modal-field .upload-img .preview img { width: 100%; height: 100%; object-fit: cover; }

    .type-picker { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.7rem; }
    .type-picker button {
      padding: 1rem 1.1rem;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      text-align: left;
      cursor: pointer;
    }
    .type-picker button:hover { border-color: var(--accent); transform: translateY(-1px); box-shadow: var(--shadow-sm); }
    .type-picker button b { display: block; font-size: 0.98rem; font-weight: 500; margin-bottom: 0.3rem; letter-spacing: 0.01em; }
    .type-picker button span { color: var(--muted); font-size: 0.8rem; line-height: 1.5; }

    /* Toast */
    .toast {
      position: fixed;
      bottom: 1.8rem;
      right: 1.8rem;
      padding: 0.9rem 1.3rem;
      background: var(--panel);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      border-radius: 8px;
      box-shadow: var(--shadow);
      font-size: 0.9rem;
      opacity: 0;
      transform: translateY(20px);
      transition: opacity 0.3s, transform 0.3s;
      z-index: 999;
      max-width: 400px;
    }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.ok  { border-left-color: var(--ok); }
    .toast.err { border-left-color: var(--err); }

    .empty-state { color: var(--muted); font-style: italic; font-size: 0.86rem; padding: 0.4rem 0 0.2rem; }

    /* Responsive */
    @media (max-width: 880px) {
      #app { grid-template-columns: 1fr; grid-template-rows: 64px auto 1fr; grid-template-areas: "topbar" "sidebar" "main"; }
      .sidebar { border-right: none; border-bottom: 1px solid var(--border); padding: 0.7rem; display: flex; flex-wrap: wrap; gap: 0.35rem; }
      .sidebar h4 { display: none; }
      .sidebar .tab { width: auto; padding: 0.5rem 0.9rem; font-size: 0.86rem; margin-bottom: 0; }
      .main { padding: 1.4rem; }
      .block-card { grid-template-columns: 50px 1fr; gap: 0.5rem; }
      .block-card .visible-toggle, .block-card .edit-btn { grid-column: span 1; }
      .type-picker { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- ============ Login ============ -->
  <div id="login">
    <form id="login-form">
      <h1>Autoforum · CMS</h1>
      <div class="sub">Panel administracyjny</div>
      <div class="field">
        <label for="li-email">E-mail</label>
        <input id="li-email" type="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label for="li-pass">Hasło</label>
        <input id="li-pass" type="password" required autocomplete="current-password" />
      </div>
      <button type="submit" id="li-submit">Zaloguj się</button>
      <div class="err" id="li-err"></div>
      <p class="hint">Konta tworzy administrator.<br />Aby uzyskać dostęp — skontaktuj się.</p>
    </form>
  </div>

  <!-- ============ App ============ -->
  <div id="app">
    <div class="topbar">
      <div class="brand">Autoforum&nbsp;·&nbsp;<b>CMS</b></div>
      <div class="topbar-right">
        <button class="theme-switch" id="theme-toggle" title="Zmień motyw">
          <svg class="icon" id="theme-icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="display:none">
            <circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
          </svg>
          <svg class="icon" id="theme-icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
          <span id="theme-label">Tryb jasny</span>
        </button>
        <span class="user" id="who"></span>
        <button class="btn-ghost" id="logout">Wyloguj</button>
      </div>
    </div>

  function applyTheme(t) {
    document.documentElement.dataset.theme = t;
    localStorage.setItem('cms.theme', t);
    const isLight = t === 'light';
    document.getElementById('theme-icon-sun').style.display  = isLight ? 'none' : '';
    document.getElementById('theme-icon-moon').style.display = isLight ? '' : 'none';
    document.getElementById('theme-label').textContent = isLight ? 'Tryb ciemny' : 'Tryb jasny';
  }
  function toggleTheme() {
    applyTheme(document.documentElement.dataset.theme === 'light' ? 'dark' : 'light');

  // ============================================================
  // Auth
  // ============================================================
  function saveAuth(a) { auth = a; localStorage.setItem('cms.auth', JSON.stringify(a)); }
  function loadAuth() {
    try { const raw = localStorage.getItem('cms.auth'); if (!raw) return null; const a = JSON.parse(raw); return (a && a.access_token) ? a : null; }
    catch (_) { return null; }
  }
  function clearAuth() { auth = null; localStorage.removeItem('cms.auth'); }
  function authHeaders(extra) {
    return Object.assign({
      apikey: SUPABASE_KEY,
      Authorization: 'Bearer ' + (auth ? auth.access_token : SUPABASE_KEY)
    }, extra || {});
  }

  // ============================================================
  // API
  // ============================================================
  async function apiFetch(path, opts) {
    opts = opts || {};
    const headers = authHeaders(opts.headers);
    if (opts.body && typeof opts.body === 'object' && !(opts.body instanceof Blob) && !(opts.body instanceof FormData)) {
      headers['Content-Type'] = 'application/json';
      opts.body = JSON.stringify(opts.body);
    }
    if (opts.prefer) headers['Prefer'] = opts.prefer;
    const url = path.startsWith('http') ? path : (SUPABASE_URL + path);
    const r = await fetch(url, Object.assign({}, opts, { headers }));
    if (!r.ok) {
      let msg = 'HTTP ' + r.status;
      try { const j = await r.json(); msg = j.message || j.error_description || j.error || msg; } catch(_){}
      throw new Error(msg);
    }
    const ct = r.headers.get('content-type') || '';
    return ct.indexOf('json') >= 0 ? r.json() : null;
  }

  async function loginRequest(email, password) {
    return apiFetch('/auth/v1/token?grant_type=password', { method: 'POST', body: { email, password } });
  }

  async function loadAll() {
    const [s, m, b] = await Promise.all([
      apiFetch('/rest/v1/cms_strings?select=key,value,page,label,kind,sort_index&order=page.asc,sort_index.asc,key.asc'),
      apiFetch('/rest/v1/cms_media?select=key,url,page,label,alt,sort_index&order=page.asc,sort_index.asc,key.asc'),
      apiFetch('/rest/v1/cms_blocks?select=id,page,region,type,data,order_index,visible&order=region.asc,order_index.asc')
    ]);
    strings = s; media = m; blocks = b;
  }

    return apiFetch('/rest/v1/cms_strings?key=eq.' + encodeURIComponent(key), {
      method: 'PATCH', prefer: 'return=minimal',

  async function upsertBlock(block) {
    if (block.id) {
      return apiFetch('/rest/v1/cms_blocks?id=eq.' + block.id, {
        method: 'PATCH', prefer: 'return=representation',
        body: { page: block.page, region: block.region, type: block.type, data: block.data,
                order_index: block.order_index, visible: block.visible,
                updated_at: new Date().toISOString(), updated_by: auth.user.id }
      });
    }
    return apiFetch('/rest/v1/cms_blocks', {
      method: 'POST', prefer: 'return=representation',
      body: { page: block.page, region: block.region, type: block.type, data: block.data,
              order_index: block.order_index, visible: block.visible !== false, updated_by: auth.user.id }
    });
  }
  async function deleteBlock(id) {
    return apiFetch('/rest/v1/cms_blocks?id=eq.' + id, { method: 'DELETE', prefer: 'return=minimal' });
  }
  async function setBlockVisibility(id, visible) {

      body: { visible: visible, updated_at: new Date().toISOString(), updated_by: auth.user.id }

  async function setBlockOrder(id, order_index) {

      method: 'PATCH', prefer: 'return=minimal',
      body: { order_index: order_index, updated_at: new Date().toISOString(), updated_by: auth.user.id }
    });
  }

  async function uploadFile(file) {
    const ext = (file.name.split('.').pop() || 'bin').toLowerCase().replace(/[^a-z0-9]/g,'');
    const safe = file.name.replace(/\.[^.]+$/,'').replace(/[^a-zA-Z0-9_-]/g,'_').slice(0,40) || 'image';
    const path = Date.now() + '_' + safe + '.' + ext;
    const url = SUPABASE_URL + '/storage/v1/object/' + STORAGE_BUCKET + '/' + encodeURIComponent(path);
    const r = await fetch(url, {
      method: 'POST',
      headers: authHeaders({ 'Content-Type': file.type || 'application/octet-stream' }),
      body: file
    });
    if (!r.ok) {
      let msg = 'Upload failed ' + r.status;
      try { const j = await r.json(); msg = j.message || msg; } catch(_){}
      throw new Error(msg);
    }
    return SUPABASE_URL + '/storage/v1/object/public/' + STORAGE_BUCKET + '/' + encodeURIComponent(path);
  }

    e.preventDefault();
    errEl.textContent = '';
    const email = document.getElementById('li-email').value.trim();
    const pass = document.getElementById('li-pass').value;
    try {
      const r = await loginRequest(email, pass);
      saveAuth({ access_token: r.access_token, refresh_token: r.refresh_token, user: { id: r.user.id, email: r.user.email } });
      await bootApp();
    } catch (e) {
      errEl.textContent = e.message || String(e);
    }
  });

  document.getElementById('logout').addEventListener('click', function () {
    clearAuth();
    location.reload();
  });

  // ============================================================
  // Boot
  // ============================================================
  async function bootApp() {
    try { await loadAll(); }
    catch (e) {
      if (/JWT|token|401|403/i.test(e.message)) {
        clearAuth();
        toast('Sesja wygasła, zaloguj się ponownie.', 'err');
        setTimeout(function(){ location.reload(); }, 1500);
        return;
      }
      toast('Błąd ładowania: ' + e.message, 'err');
      return;
    }
    loginEl.style.display = 'none';
    appEl.classList.add('ready');
    document.getElementById('who').textContent = auth.user.email;
    document.querySelectorAll('.sidebar .tab').forEach(function (btn) {
      btn.addEventListener('click', function () { activateTab(btn.dataset.tab); });
    });
    activateTab('landing');
  }

  // ============================================================
  // Render
  // ============================================================
  function activateTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.sidebar .tab').forEach(function (b) {
      b.classList.toggle('active', b.dataset.tab === tab);
    });
    renderPage(tab);
    document.querySelector('.main').scrollTop = 0;
  }

  function renderPage(page) {
    const main = document.getElementById('main');
    main.innerHTML = '';

    const info = PAGE_INFO[page] || { name: page, desc: '' };
    const head = document.createElement('div'); head.className = 'page-head';
    const file = PAGE_FILE[page];
    const previewLink = file
      ? '<a class="btn-ghost preview-link" href="' + file + '?v=' + Date.now() + '" target="_blank" rel="noopener">Zobacz stronę ↗</a>'
      : '';
    head.innerHTML = '<div class="page-head-row">' +
      '<div><h2>' + escapeHtml(info.name) + '</h2><div class="desc">' + escapeHtml(info.desc) + '</div></div>' +
      previewLink + '</div>';
    main.appendChild(head);

    // ---- STRINGS (grouped) ----
    const pageStrings = strings.filter(function (s) { return s.page === page; });
    if (pageStrings.length) {
      const sec = makeSection('Teksty i linki', 'Klikni w pole, edytuj, wyjdź z pola — zapis jest automatyczny.');
      const grouped = groupStrings(pageStrings);
      grouped.forEach(function (g) {
        const sub = document.createElement('div'); sub.className = 'subgroup';
        const sh = document.createElement('div'); sh.className = 'subgroup-head';
        sh.innerHTML = '<h4>' + escapeHtml(g.label) + '</h4>' + (g.desc ? '<div class="desc">' + escapeHtml(g.desc) + '</div>' : '');
        sub.appendChild(sh);
        g.items.forEach(function (s) { sub.appendChild(renderStringRow(s)); });
        sec.appendChild(sub);
      });
      main.appendChild(sec);
    }

    // ---- MEDIA ----
    const pageMedia = media.filter(function (m) { return m.page === page; });
    if (pageMedia.length) {
      const sec = makeSection('Zdjęcia i logo', 'Kliknij "Wymień" aby załadować nowy plik (JPG, PNG, WebP). Optimalne ~1200–2000 px szerokości.');
      pageMedia.forEach(function (m) { sec.appendChild(renderMediaRow(m)); });
      main.appendChild(sec);
    }

    // ---- BLOCKS ----
    const regions = PAGE_REGIONS[page];
    if (regions && regions.length) {
      const sec = makeSection('Bloki — dodawanie nowych sekcji',
        'Każdy "region" to miejsce na stronie, gdzie możesz dodać dowolny blok (kartę modelu, doradcę, pasek promo, sekcję CTA itp). Bloki dziedziczą styl strony.');
      regions.forEach(function (r) { sec.appendChild(renderRegion(page, r)); });
      main.appendChild(sec);
    }

    if (!pageStrings.length && !pageMedia.length && !(regions && regions.length)) {
      const e = document.createElement('div');
      e.className = 'empty-state';
      e.textContent = 'Brak elementów do edycji na tej stronie.';
      main.appendChild(e);
    }
  }

  function makeSection(title, help) {
    const sec = document.createElement('section');
    sec.className = 'section';
    sec.innerHTML = '<h3>' + escapeHtml(title) + '</h3>' + (help ? '<p class="help">' + escapeHtml(help) + '</p>' : '');
    return sec;
  }

  // Group strings into sections (preserves sort_index order within each section)
  function groupStrings(items) {
    const out = [];
    const used = new Set();
    STRING_SECTIONS.forEach(function (S) {
      const matched = items.filter(function (s) { return !used.has(s.key) && S.test(s.key); });
      if (matched.length) {
        matched.forEach(function (s) { used.add(s.key); });
        out.push({ label: S.label, desc: S.desc, items: matched });
      }
    });
    const rest = items.filter(function (s) { return !used.has(s.key); });
    if (rest.length) out.push({ label: 'Inne', desc: '', items: rest });
    return out;
  }

  // ====== String row ======
  function renderStringRow(row) {
    const wrap = document.createElement('div');
    wrap.className = 'field-row';

    const lab = document.createElement('div');
    const KIND_LABEL = { href: 'Link (adres)', url: 'Link (adres)', longtext: 'Dłuższy tekst', html: 'Tekst z formatowaniem' };
    const kindLabel = KIND_LABEL[row.kind];
    lab.innerHTML = '<span class="label-text">' + escapeHtml(row.label || row.key) + '</span>' +
                    (kindLabel ? '<span class="label-key">' + kindLabel + '</span>' : '');

    const ctrl = document.createElement('div'); ctrl.className = 'ctrl';
    const input = (row.kind === 'longtext' || row.kind === 'html')
      ? document.createElement('textarea')
      : document.createElement('input');
    if (input.tagName === 'INPUT') input.type = (row.kind === 'href' || row.kind === 'url') ? 'url' : 'text';
    input.value = row.value || '';

    const state = document.createElement('span'); state.className = 'save-state';
    let saving = false, last = row.value || '';
    async function save() {
      if (saving || input.value === last) return;
      saving = true; state.textContent = 'Zapisuję…'; state.className = 'save-state';
      try {
        await updateString(row.key, input.value);
        last = input.value; row.value = input.value;
        state.textContent = '✓ Zapisano'; state.className = 'save-state ok';
        setTimeout(function () { if (state.textContent === '✓ Zapisano') state.textContent = ''; }, 2200);
      } catch (e) { state.textContent = 'Błąd: ' + e.message; state.className = 'save-state err'; }
      finally { saving = false; }
    }
    input.addEventListener('blur', save);
    input.addEventListener('keydown', function (e) { if (e.key === 'Enter' && input.tagName === 'INPUT') { e.preventDefault(); input.blur(); } });
    ctrl.appendChild(input);
    ctrl.appendChild(state);

    wrap.appendChild(lab);
    wrap.appendChild(ctrl);
    return wrap;
  }

  // ====== Media row ======
  function renderMediaRow(row) {
    const wrap = document.createElement('div'); wrap.className = 'media-row';

    const thumb = document.createElement('div'); thumb.className = 'media-thumb';
    if (row.url) {
      const img = document.createElement('img');
      img.src = row.url; img.alt = row.alt || row.label || row.key;
      img.onerror = function () { thumb.innerHTML = '<span class="empty">brak</span>'; };
      thumb.appendChild(img);
    } else { thumb.innerHTML = '<span class="empty">brak</span>'; }

    const info = document.createElement('div'); info.className = 'media-info';
    info.innerHTML = '<div class="label-text">Zdjęcie</div>' +
                     '<div class="name">' + escapeHtml(row.label || row.key) + '</div>' +
                     '<div class="url">' + escapeHtml(row.url || '') + '</div>';

    const right = document.createElement('div'); right.className = 'right';
    const state = document.createElement('span'); state.className = 'save-state';
    const btn = document.createElement('button'); btn.className = 'btn-primary'; btn.textContent = 'Wymień';
    const fileInput = document.createElement('input'); fileInput.type = 'file'; fileInput.accept = 'image/*'; fileInput.style.display = 'none';

    btn.addEventListener('click', function () { fileInput.click(); });
    fileInput.addEventListener('change', async function () {
      const f = fileInput.files && fileInput.files[0]; if (!f) return;
      state.textContent = 'Wgrywam…'; state.className = 'save-state';
      try {
        const url = await uploadFile(f);
        await updateMediaUrl(row.key, url);
        row.url = url;
        info.querySelector('.url').textContent = url;
        thumb.innerHTML = ''; const img = document.createElement('img'); img.src = url; thumb.appendChild(img);
        state.textContent = '✓ Zapisano'; state.className = 'save-state ok';
        setTimeout(function () { if (state.textContent === '✓ Zapisano') state.textContent = ''; }, 2200);
      } catch (e) { state.textContent = 'Błąd: ' + e.message; state.className = 'save-state err'; }
      fileInput.value = '';
    });

    right.appendChild(state); right.appendChild(btn); right.appendChild(fileInput);

    wrap.appendChild(thumb); wrap.appendChild(info); wrap.appendChild(right);
    return wrap;
  }

  // ====== Region / blocks ======
  function renderRegion(page, region) {
    const wrap = document.createElement('div'); wrap.className = 'region';

    const head = document.createElement('div'); head.className = 'region-head';
    const meta = REGION_LABELS[region] || { name: region, desc: '' };
    const left = document.createElement('div');
    left.innerHTML = '<h4>' + escapeHtml(meta.name) + '</h4><div class="desc">' + escapeHtml(meta.desc) + '</div>';
    const addBtn = document.createElement('button'); addBtn.className = 'btn-primary'; addBtn.textContent = '+ Dodaj blok';
    addBtn.addEventListener('click', function () { openTypePicker(page, region); });
    head.appendChild(left); head.appendChild(addBtn);
    wrap.appendChild(head);

    const regionBlocks = blocks.filter(function (b) { return b.region === region; })
      .sort(function (a, b) { return a.order_index - b.order_index; });

    if (!regionBlocks.length) {
      const e = document.createElement('div'); e.className = 'empty-state';
      e.textContent = 'Brak bloków. Kliknij "+ Dodaj blok" by zacząć.';
      wrap.appendChild(e);
    } else {
      regionBlocks.forEach(function (b) { wrap.appendChild(renderBlockCard(b)); });
    }
    return wrap;
  }

  function renderBlockCard(b) {
    const wrap = document.createElement('div'); wrap.className = 'block-card';

    const order = document.createElement('div'); order.className = 'order';
    const orderIn = document.createElement('input'); orderIn.type = 'number'; orderIn.step = '0.5'; orderIn.value = b.order_index;
    orderIn.title = 'Kolejność na stronie (mniejsza liczba = wyżej)';
    orderIn.addEventListener('change', async function () {
      try {
        const v = parseFloat(orderIn.value);
        await setBlockOrder(b.id, v); b.order_index = v;
        toast('Kolejność zapisana', 'ok');
        renderPage(currentTab);
      } catch (e) { toast('Błąd: ' + e.message, 'err'); orderIn.value = b.order_index; }
    });
    order.appendChild(orderIn);

    const summary = document.createElement('div'); summary.className = 'summary';
    const chip = document.createElement('span'); chip.className = 'type-chip';
    chip.textContent = (BLOCK_SCHEMA[b.type] && BLOCK_SCHEMA[b.type].label) || b.type;
    summary.appendChild(chip);
    summary.appendChild(document.createTextNode(blockSummary(b)));

    const vis = document.createElement('button');
    vis.className = 'visible-toggle' + (b.visible ? '' : ' hidden');
    vis.textContent = b.visible ? '● Widoczny' : '○ Ukryty';
    vis.title = b.visible ? 'Kliknij aby ukryć (zostaje w bazie, ale nie widać na stronie)' : 'Kliknij aby przywrócić';
    vis.addEventListener('click', async function () {
      try {
        await setBlockVisibility(b.id, !b.visible); b.visible = !b.visible;
        renderPage(currentTab); toast(b.visible ? 'Pokazano' : 'Ukryto', 'ok');
      } catch (e) { toast('Błąd: ' + e.message, 'err'); }
    });

    const editBtn = document.createElement('button'); editBtn.className = 'edit-btn'; editBtn.textContent = 'Edytuj';
    editBtn.addEventListener('click', function () { openBlockEditor(b); });

    const delBtn = document.createElement('button'); delBtn.className = 'btn-danger'; delBtn.textContent = 'Usuń';
    delBtn.addEventListener('click', async function () {
      if (!confirm('Usunąć ten blok?\n\nHistoria zostaje w bazie, ale w panelu nie zobaczysz go więcej.')) return;
      try {
        await deleteBlock(b.id);
        blocks = blocks.filter(function (x) { return x.id !== b.id; });
        renderPage(currentTab); toast('Usunięto', 'ok');
      } catch (e) { toast('Błąd: ' + e.message, 'err'); }
    });

    wrap.appendChild(order);
    wrap.appendChild(summary);
    wrap.appendChild(vis);
    wrap.appendChild(editBtn);
    wrap.appendChild(delBtn);
    return wrap;
  }

  function blockSummary(b) {
    const d = b.data || {};
    if (b.type === 'model_card')    return d.name || '(bez nazwy)';
    if (b.type === 'team_member')   return d.name || '(bez nazwy)';
    if (b.type === 'promo_strip')   return (d.text || '').slice(0, 70);
    if (b.type === 'quote_ribbon')  return (d.text || '').slice(0, 70);
    if (b.type === 'cta_section')   return (d.title || '') + ' ' + (d.title_bold || '');
    if (b.type === 'text_section')  return (d.title || d.eyebrow || '').slice(0, 70);
    if (b.type === 'feature_split') return (d.title || d.eyebrow || '').slice(0, 70);
    if (b.type === 'image_full')    return d.caption || '(zdjęcie)';
    return '';
  }

  // ====== Type picker modal ======
  function openTypePicker(page, region) {
    const ov = document.getElementById('modal-overlay');
    document.getElementById('modal-eyebrow').textContent = 'Nowy blok';
    document.getElementById('modal-title').textContent = 'Wybierz typ bloku';
    const meta = REGION_LABELS[region] || { name: region, desc: '' };
    document.getElementById('modal-desc').textContent = 'Region: ' + meta.name + (meta.desc ? ' · ' + meta.desc : '');
    const body = document.getElementById('modal-body'); body.innerHTML = '';
    const foot = document.getElementById('modal-foot'); foot.innerHTML = '';

    const grid = document.createElement('div'); grid.className = 'type-picker';
    Object.keys(BLOCK_SCHEMA).forEach(function (type) {
      const meta = BLOCK_SCHEMA[type];
      const allowed = meta.universal
        ? !['mercedes.models','zespol-mercedes.team-list','zespol-maybach.team-list'].includes(region)
        : (meta.regions || []).indexOf(region) >= 0;
      if (!allowed) return;
      const btn = document.createElement('button');
      btn.innerHTML = '<b>' + escapeHtml(meta.label) + '</b><span>' + escapeHtml(meta.desc) + '</span>';
      btn.addEventListener('click', function () {
        closeModal();
        openBlockEditor({ page: page, region: region, type: type, data: {}, order_index: nextOrderIndex(region), visible: true });
      });
      grid.appendChild(btn);
    });
    if (!grid.children.length) {
      grid.innerHTML = '<div class="empty-state">Brak dostępnych typów dla tego regionu.</div>';
    }
    body.appendChild(grid);
    const cancel = document.createElement('button'); cancel.className = 'btn-ghost'; cancel.textContent = 'Anuluj';
    cancel.addEventListener('click', closeModal);
    foot.appendChild(cancel);
    ov.classList.add('open');
  }

  function nextOrderIndex(region) {
    const rb = blocks.filter(function (b) { return b.region === region; });
    if (!rb.length) return 1;
    return Math.max.apply(null, rb.map(function (b) { return b.order_index; })) + 1;
  }

  // ====== Block editor modal ======
  function openBlockEditor(b) {
    const isNew = !b.id;
    const schema = BLOCK_SCHEMA[b.type];
    const ov = document.getElementById('modal-overlay');
    const regionMeta = REGION_LABELS[b.region] || { name: b.region, desc: '' };

    document.getElementById('modal-eyebrow').textContent = isNew ? 'Nowy blok' : 'Edycja bloku';
    document.getElementById('modal-title').textContent = schema ? schema.label : b.type;
    document.getElementById('modal-desc').textContent =
      (schema ? schema.desc + ' · ' : '') + 'Region: ' + regionMeta.name;

    const body = document.getElementById('modal-body'); body.innerHTML = '';
    const foot = document.getElementById('modal-foot'); foot.innerHTML = '';
    const draft = Object.assign({}, b.data || {});

    schema.fields.forEach(function (f) {
      const wrap = document.createElement('div'); wrap.className = 'modal-field';
      const lbl = document.createElement('label'); lbl.textContent = f.label;
      wrap.appendChild(lbl);

      if (f.kind === 'image') {
        const row = document.createElement('div'); row.className = 'upload-img';
        const prev = document.createElement('div'); prev.className = 'preview';
        if (draft[f.key]) { const i = document.createElement('img'); i.src = draft[f.key]; prev.appendChild(i); }
        const urlIn = document.createElement('input'); urlIn.type = 'url'; urlIn.value = draft[f.key] || ''; urlIn.placeholder = 'URL zdjęcia lub wgraj plik →';
        const btn = document.createElement('button'); btn.textContent = 'Wgraj plik'; btn.type = 'button'; btn.className = 'btn-primary';
        const fileIn = document.createElement('input'); fileIn.type = 'file'; fileIn.accept = 'image/*'; fileIn.style.display = 'none';
        btn.addEventListener('click', function () { fileIn.click(); });
        fileIn.addEventListener('change', async function () {
          const f2 = fileIn.files && fileIn.files[0]; if (!f2) return;
          btn.textContent = 'Wgrywam…'; btn.disabled = true;
          try {
            const url = await uploadFile(f2);
            urlIn.value = url; draft[f.key] = url;
            prev.innerHTML = ''; const i = document.createElement('img'); i.src = url; prev.appendChild(i);
            toast('Wgrane', 'ok');
          } catch (e) { toast('Błąd: ' + e.message, 'err'); }
          btn.textContent = 'Wgraj plik'; btn.disabled = false; fileIn.value = '';
        });
        urlIn.addEventListener('input', function () { draft[f.key] = urlIn.value; });
        row.appendChild(prev); row.appendChild(urlIn); row.appendChild(btn); row.appendChild(fileIn);
        wrap.appendChild(row);
      } else if (f.kind === 'longtext' || f.kind === 'lines') {
        const ta = document.createElement('textarea');
        ta.value = f.kind === 'lines'
          ? (Array.isArray(draft[f.key]) ? draft[f.key].join('\n') : (draft[f.key] || ''))
          : (draft[f.key] || '');
        ta.addEventListener('input', function () {
          if (f.kind === 'lines') draft[f.key] = ta.value.split('\n').map(function (s) { return s.trim(); }).filter(Boolean);
          else draft[f.key] = ta.value;
        });
        wrap.appendChild(ta);
      } else if (f.kind === 'select') {
        const sel = document.createElement('select');
        f.options.forEach(function (opt) {
          const o = document.createElement('option'); o.value = opt[0]; o.textContent = opt[1];
          sel.appendChild(o);
        });
        sel.value = draft[f.key] || f.default || f.options[0][0];
        draft[f.key] = sel.value;
        sel.addEventListener('change', function () { draft[f.key] = sel.value; });
        wrap.appendChild(sel);
      } else {
        const inp = document.createElement('input');
        inp.type = (f.kind === 'url') ? 'url' : 'text';
        inp.value = draft[f.key] || '';
        inp.addEventListener('input', function () { draft[f.key] = inp.value; });
        wrap.appendChild(inp);
      }
      if (f.hint) {
        const h = document.createElement('small'); h.className = 'hint'; h.textContent = f.hint;
        wrap.appendChild(h);
      }
      body.appendChild(wrap);
    });

    const cancel = document.createElement('button'); cancel.className = 'btn-ghost'; cancel.textContent = 'Anuluj';
    cancel.addEventListener('click', closeModal);
    const save = document.createElement('button'); save.className = 'btn-primary'; save.textContent = isNew ? 'Dodaj blok' : 'Zapisz zmiany';
    save.addEventListener('click', async function () {
      save.disabled = true; save.textContent = 'Zapisuję…';
      try {
        const payload = Object.assign({}, b, { data: draft });
        const res = await upsertBlock(payload);
        const saved = Array.isArray(res) ? res[0] : res;
        if (isNew) {
          if (saved && saved.id) blocks.push(saved);
        } else {
          const idx = blocks.findIndex(function (x) { return x.id === b.id; });
          if (idx >= 0 && saved) blocks[idx] = saved;
        }
        closeModal();
        renderPage(currentTab);
        toast(isNew ? 'Dodano blok' : 'Zapisano', 'ok');
      } catch (e) { toast('Błąd: ' + e.message, 'err'); save.disabled = false; save.textContent = isNew ? 'Dodaj blok' : 'Zapisz zmiany'; }
    });
    foot.appendChild(cancel); foot.appendChild(save);
    ov.classList.add('open');
  }

  function closeModal() { document.getElementById('modal-overlay').classList.remove('open'); }
  document.getElementById('modal-close').addEventListener('click', closeModal);
  document.getElementById('modal-overlay').addEventListener('click', function (e) {
    if (e.target.id === 'modal-overlay') closeModal();
  });
  document.addEventListener('keydown', function (e) {
    if (e.key === 'Escape') closeModal();
  });

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
      return ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'})[c];
    });
  }

  // ============================================================
  // Init
  // ============================================================
  (function init() {
    const a = loadAuth();
    if (a) { auth = a; bootApp(); }
  })();
  </script>
</body>
