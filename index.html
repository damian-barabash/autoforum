<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>AUTOFORUM Warszawa — Mercedes-Benz × Mercedes-Maybach</title>
  <meta name="description" content="Dwa nowe salony Autoforum w Warszawie. Mercedes-Benz i Mercedes-Maybach. Wybierz świat, do którego chcesz wejść." />

  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/landing.css" />
</head>
<body class="landing">

  <header class="landing-header">
    <a class="af-logo" href="index.html" aria-label="Autoforum — strona główna">
      <img class="af-logo__img" src="assets/img/autoforumlogo.png" alt="Auto Forum" />
    </a>

    <div class="landing-header__meta">
      <b>Wybierz salon</b><br />
      Najedź na logo
    </div>
  </header>

  <main class="split" aria-label="Wybór salonu">

    <!-- ============ Mercedes-Benz half ============ -->
    <a class="half half--mb" href="mercedes.html" data-target="mercedes" aria-label="Salon Mercedes-Benz w Warszawie">
      <div class="half-bg" aria-hidden="true"></div>

      <div class="half-content">
        <div class="half-logo">
          <img class="half-logo__img"
               src="assets/img/Mercedes-Logo.svg.png"
               alt="Mercedes-Benz" />
        </div>
        <span class="half-brand">Mercedes-Benz</span>
      </div>

      <div class="half-meta">
        <b>Salon Autoforum</b>
        <span>Warszawa</span>
      </div>

      <div class="half-cta">
        <span>Wejdź do salonu</span>
        <span aria-hidden="true">→</span>
      </div>
    </a>

    <div class="divider" aria-hidden="true"></div>

    <!-- ============ Mercedes-Maybach half ============ -->
    <a class="half half--mh" href="maybach.html" data-target="maybach" aria-label="Atelier Mercedes-Maybach w Warszawie">
      <div class="half-bg" aria-hidden="true"></div>

      <div class="half-content">
        <div class="half-logo">
          <img class="half-logo__img"
               src="assets/img/maybach-sign-logo.png"
               alt="Mercedes-Maybach" />
        </div>
        <span class="half-brand">Mercedes-Maybach</span>
      </div>

      <div class="half-meta">
        <b>Atelier Autoforum</b>
        <span>Warszawa</span>
      </div>

      <div class="half-cta">
        <span>Wejdź do atelier</span>
        <span aria-hidden="true">→</span>
      </div>
    </a>
  </main>

  <footer class="landing-footer">
    <span class="ft-left">Otwarcie · wiosna 2026</span>
    <span class="ft-center">Dwa salony · jedna pasja</span>
    <span class="ft-right">© Autoforum sp. z o.o.</span>
  </footer>

  <script src="js/landing.js"></script>
</body>
</html>
