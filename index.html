<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title data-cms="landing.title">AUTOFORUM Warszawa — Mercedes-Benz × Mercedes-Maybach</title>
  <meta name="description" content="Dwa nowe salony Autoforum w Warszawie. Mercedes-Benz i Mercedes-Maybach. Wybierz świat, do którego chcesz wejść." data-cms-attr="content:landing.meta_description" />

  <link rel="stylesheet" href="css/common.css" />
  <link rel="stylesheet" href="css/landing.css" />
  <script src="js/coming-soon.js"></script>
</head>
<body class="landing" data-cms-page="landing">

  <header class="landing-header">
    <a class="af-logo" href="index.html" aria-label="Autoforum — strona główna">
      <img class="af-logo__img" src="assets/img/autoforumlogo.png" alt="Auto Forum" data-cms-src="global.logo.autoforum" />
    </a>

    <div class="landing-header__meta">
      <b data-cms="landing.header.eyebrow">Wybierz salon</b><br />
      <span data-cms="landing.header.hint">Najedź na logo</span>
    </div>
  </header>

  <main class="split" aria-label="Wybór salonu">

    <!-- ============ Mercedes-Benz half ============ -->
    <a class="half half--mb" href="mercedes.html" data-target="mercedes" aria-label="Salon Mercedes-Benz w Warszawie">
      <div class="half-bg" aria-hidden="true"></div>

      <div class="half-content">
        <div class="half-logo">
          <img class="half-logo__img"
               src="assets/img/Mercedes-Logo.svg.png"
               alt="Mercedes-Benz"
               data-cms-src="global.logo.mb_star" />
        </div>
      </div>

      <div class="half-meta">
        <b data-cms="landing.mb.meta_lead">Salon Autoforum</b>
        <span data-cms="landing.mb.meta_city">Warszawa</span>
      </div>


    </a>

    <!-- ============ Mercedes-Maybach half ============ -->
    <a class="half half--mh" href="maybach.html" data-target="maybach" aria-label="Atelier Mercedes-Maybach w Warszawie">
      <div class="half-bg" aria-hidden="true"></div>

      <div class="half-content">
        <div class="half-logo">
          <img class="half-logo__img"
               src="assets/img/maybach-sign-logo.png"
               alt="Mercedes-Maybach"
               data-cms-src="global.logo.mh_crest" />
        </div>
      </div>

      <div class="half-meta">
        <b data-cms="landing.mh.meta_lead">Atelier Autoforum</b>
        <span data-cms="landing.mh.meta_city">Warszawa</span>
      </div>

    </a>
  </main>

  <div class="cms-region" data-cms-region="landing.before-footer"></div>

  <footer class="landing-footer">
    <span class="ft-center"><span class="ft-lead" data-cms="landing.footer.lead">Dwa salony</span><span data-cms="landing.footer.tail"> · jedna pasja</span></span>
  </footer>

  <script src="js/cms.js"></script>
  <script src="js/landing.js"></script>
</body>
</html>
